<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FMGE Vault</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#111827;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

h1,h2{
  text-align:center;
}

.page{
  display:none;
}

.active{
  display:block;
}

.card{
  background:#1f2937;
  padding:16px;
  margin-bottom:10px;
  border-radius:12px;
  cursor:pointer;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  font-size:16px;
}

.back{
  margin-top:20px;
}
</style>
</head>

<body>

<div id="home" class="page active">

<h1>FMGE Vault</h1>

<div class="card" onclick="openSubject('Anatomy')">Anatomy</div>
<div class="card" onclick="openSubject('Physiology')">Physiology</div>
<div class="card" onclick="openSubject('Biochemistry')">Biochemistry</div>
<div class="card" onclick="openSubject('Pathology')">Pathology</div>
<div class="card" onclick="openSubject('Pharmacology')">Pharmacology</div>
<div class="card" onclick="openSubject('Microbiology')">Microbiology</div>
<div class="card" onclick="openSubject('FMT')">FMT</div>
<div class="card" onclick="openSubject('PSM')">PSM</div>
<div class="card" onclick="openSubject('Medicine')">Medicine</div>
<div class="card" onclick="openSubject('Surgery')">Surgery</div>
<div class="card" onclick="openSubject('OBG')">OBG</div>
<div class="card" onclick="openSubject('Pediatrics')">Pediatrics</div>
<div class="card" onclick="openSubject('ENT')">ENT</div>
<div class="card" onclick="openSubject('Ophthalmology')">Ophthalmology</div>
<div class="card" onclick="openSubject('Orthopedics')">Orthopedics</div>
<div class="card" onclick="openSubject('Dermatology')">Dermatology</div>
<div class="card" onclick="openSubject('Psychiatry')">Psychiatry</div>
<div class="card" onclick="openSubject('Radiology')">Radiology</div>
<div class="card" onclick="openSubject('Anesthesia')">Anesthesia</div>

</div>

<div id="subjectPage" class="page">

<h2 id="subjectTitle"></h2>

<div class="card">📺 Full Lectures</div>

<div class="card">⚡ Rapid Revision</div>

<div class="card">📖 Notes</div>

<button class="back" onclick="goHome()">⬅ Back</button>

</div>

<script>

function openSubject(subject){

document.getElementById('home').classList.remove('active');

document.getElementById('subjectPage').classList.add('active');

document.getElementById('subjectTitle').innerText = subject;

}

function goHome(){

document.getElementById('subjectPage').classList.remove('active');

document.getElementById('home').classList.add('active');

}

</script>

</body>
</html>
